name: ci

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    ci:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v2

            - name: Setup Node.js environment
              uses: actions/setup-node@v3
              with:
                  node-version: '20.x'

            - name: Install dependencies
              run: npm install

            - name: Build application
              run: npm run build

            - name: Log in to Docker Hub
              uses: docker/login-action@v2
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build and push Production Docker image
              if: (github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'staging')) || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'))
              run: |
                  docker build -t ${{ secrets.DOCKER_USERNAME }}/half-year:latest -f docker/dockerfile .
                  docker push ${{ secrets.DOCKER_USERNAME }}/half-year:latest